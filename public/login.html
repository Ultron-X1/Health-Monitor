<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Patient Login | Smart Health Monitor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
background:linear-gradient(135deg,#0d47a1,#42a5f5);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
width:95%;
max-width:950px;
border:none;
border-radius:20px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.left{
background:#0d47a1;
color:white;
padding:50px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.logo{
width:120px;
height:120px;
border-radius:50%;
background:white;
display:flex;
justify-content:center;
align-items:center;
font-size:60px;
}

.right{
padding:45px;
}

.form-control{
height:50px;
border-radius:10px;
}

.btn-primary{
height:50px;
border-radius:10px;
font-weight:bold;
background:#0d47a1;
border:none;
}

.btn-primary:hover{
background:#08306b;
}

.btn-outline-primary{
height:50px;
border-radius:10px;
font-weight:bold;
}

.spinner-border{
display:none;
}

</style>

</head>

<body>

<div class="card">

<div class="row g-0">

<div class="col-md-5 left">

<div class="logo">🏥</div>

<h2 class="mt-3">
Smart Health Monitoring
</h2>

<p>
Secure Login Portal
</p>

</div>

<div class="col-md-7 right">

<h3 class="fw-bold mb-4">
Login
</h3>

<form id="loginForm">

<div class="mb-3">

<label class="fw-bold">
Login As
</label>

<br>

<div class="form-check form-check-inline">

<input
class="form-check-input"
type="radio"
name="loginType"
value="patient"
checked>

<label class="form-check-label">
Patient
</label>

</div>

<div class="form-check form-check-inline">

<input
class="form-check-input"
type="radio"
name="loginType"
value="doctor">

<label class="form-check-label">
Doctor
</label>

</div>

</div>

<!-- Doctor -->

<div id="doctorFields" style="display:none;">

<div class="mb-3">

<input
id="doctorId"
class="form-control"
placeholder="Doctor ID">

</div>

<div class="mb-3">

<input
id="password"
type="password"
class="form-control"
placeholder="Password">

</div>

</div>

<!-- Patient -->

<div id="patientFields">

<div class="mb-3">

<input
id="email"
type="email"
class="form-control"
placeholder="Email"
required>

</div>

<div class="mb-4">

<input
id="phone"
class="form-control"
placeholder="Phone Number"
required>

</div>

</div>

<button class="btn btn-primary w-100">

<span
id="spinner"
class="spinner-border spinner-border-sm me-2">
</span>

Login

</button>

<a
href="/register.html"
class="btn btn-outline-primary w-100 mt-3">

Register Patient

</a>

</form>

<div id="message" class="mt-3"></div>

</div>

</div>

</div>

<script>

const patientFields=document.getElementById("patientFields");
const doctorFields=document.getElementById("doctorFields");

const email=document.getElementById("email");
const phone=document.getElementById("phone");

const doctorId=document.getElementById("doctorId");
const password=document.getElementById("password");

document.querySelectorAll('input[name="loginType"]').forEach(r=>{

r.addEventListener("change",()=>{

if(r.checked && r.value==="doctor"){

patientFields.style.display="none";
doctorFields.style.display="block";

email.required=false;
phone.required=false;

doctorId.required=true;
password.required=true;

}
else{

patientFields.style.display="block";
doctorFields.style.display="none";

email.required=true;
phone.required=true;

doctorId.required=false;
password.required=false;

}

});

});

loginForm.addEventListener("submit", async (e) => {

    e.preventDefault();

    spinner.style.display = "inline-block";
    message.innerHTML = "";

    const loginType =
    document.querySelector('input[name="loginType"]:checked').value;

    let data = {};

    if (loginType === "doctor") {

        data = {
            loginType: "doctor",
            doctorId: doctorId.value,
            password: password.value
        };

    } else {

        data = {
            loginType: "patient",
            email: email.value,
            phone: phone.value
        };

    }

    try {

        const response = await fetch("/api/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        spinner.style.display = "none";

        if (result.success) {

            message.innerHTML =
            '<div class="alert alert-success">Login Successful...</div>';

            if (result.role === "doctor") {

                setTimeout(() => {

                    window.location.href = "/doctor.html";

                }, 1000);

            } else {

                localStorage.setItem("userId", result.user._id);
                localStorage.setItem("userName", result.user.fullName);

                setTimeout(() => {

                    window.location.href = "/dashboard.html";

                }, 1000);

            }

        } else {

            message.innerHTML =
            `<div class="alert alert-danger">${result.message}</div>`;

        }

    } catch (err) {

        spinner.style.display = "none";

        message.innerHTML =
        '<div class="alert alert-danger">Server Connection Error</div>';

        console.log(err);

    }

});

   
</script>

</body>
</html>
