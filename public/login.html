<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Login | Smart Health Monitor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{

background:linear-gradient(135deg,#0d47a1,#42a5f5);
height:100vh;
display:flex;
justify-content:center;
align-items:center;

}

.card{

width:95%;
max-width:950px;
border:none;
border-radius:20px;
overflow:hidden;
box-shadow:0 15px 40px rgba(0,0,0,.25);

}

.left{

background:#0d47a1;
color:white;
padding:50px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

}

.left h2{

font-weight:bold;
margin-top:20px;

}

.left p{

opacity:.9;

}

.logo{

width:120px;
height:120px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-size:60px;

}

.right{

padding:45px;

}

.form-control{

height:50px;
border-radius:10px;

}

.btn-primary{

height:50px;
border-radius:10px;
font-weight:bold;
background:#0d47a1;
border:none;

}

.btn-primary:hover{

background:#08306b;

}

.btn-outline-primary{

height:50px;
border-radius:10px;
font-weight:bold;

}

.spinner-border{

display:none;

}

#message{

margin-top:15px;

}

</style>

</head>

<body>

<div class="card">

<div class="row g-0">

<div class="col-md-5 left">

<div class="logo">
🏥
</div>

<h2>Smart Health Monitoring System</h2>

<p>

Secure Patient Login Portal

</p>

</div>

<div class="col-md-7 right">

<h3 class="mb-4 fw-bold">

Patient Login

</h3>

<form id="loginForm">

<div class="mb-3">

<label class="form-label">

Email Address

</label>

<input
type="email"
id="email"
class="form-control"
placeholder="Enter your registered email"
required>

</div>

<div class="mb-4">

<label class="form-label">

Phone Number

</label>

<input
type="text"
id="phone"
class="form-control"
placeholder="Enter your registered phone number"
required>

</div>

<button class="btn btn-primary w-100">

<span
class="spinner-border spinner-border-sm me-2"
id="spinner">
</span>

Login

</button>

<a
href="/register.html"
class="btn btn-outline-primary w-100 mt-3">

Register New Patient

</a>

</form>

<div id="message"></div>

</div>

</div>

</div>

<script>

const form=document.getElementById("loginForm");

form.addEventListener("submit",async(e)=>{

e.preventDefault();

spinner.style.display="inline-block";

message.innerHTML="";

const data={

email:email.value,
phone:phone.value

};

try{

const response=await fetch("/api/login",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify(data)

});

const result=await response.json();

spinner.style.display="none";

if(result.success){

message.innerHTML=

'<div class="alert alert-success">Login Successful... Redirecting</div>';

setTimeout(()=>{

window.location.href="/dashboard.html";

},1200);

}

else{

message.innerHTML=

'<div class="alert alert-danger">'+result.message+'</div>';

}

}

catch(err){

spinner.style.display="none";

message.innerHTML=

'<div class="alert alert-danger">Unable to connect to server.</div>';

}

});

</script>

</body>
</html>
