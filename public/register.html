<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Patient Registration</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: linear-gradient(135deg, #0b3d91, #4fc3f7);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .card {
        width: 95%;
        max-width: 900px;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      }
      .left {
        background: #0b3d91;
        color: #fff;
        padding: 40px;
      }
      .right {
        padding: 35px;
      }
      .btn-primary {
        background: #0b3d91;
      }
      .spinner-border {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="row g-0">
        <div class="col-md-5 left">
          <h2>IoT Health Monitoring</h2>
          <p>Register a patient before monitoring.</p>
          <div style="font-size: 90px; text-align: center">🩺</div>
        </div>
        <div class="col-md-7 right">
          <h3>Patient Registration</h3>
          <form id="registerForm">
            <div class="row">
              <div class="col-md-6 mb-3">
                <input
                  id="fullName"
                  class="form-control"
                  placeholder="Full Name"
                  required
                />
              </div>
              <div class="col-md-6 mb-3">
                <input
                  id="age"
                  type="number"
                  class="form-control"
                  placeholder="Age"
                  required
                />
              </div>
              <div class="col-md-6 mb-3">
                <select id="gender" class="form-select" required>
                  <option value="">Gender</option>
                  <option>Male</option>
                  <option>Female</option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <input
                  id="email"
                  type="email"
                  class="form-control"
                  placeholder="Email"
                  required
                />
              </div>
              <div class="col-md-6 mb-3">
                <input
                  id="phone"
                  class="form-control"
                  placeholder="Phone"
                  required
                />
              </div>
              <div class="col-md-6 mb-3">
                <input
                  id="emergencyContact"
                  class="form-control"
                  placeholder="Emergency Contact"
                />
              </div>
              <div class="col-12 mb-3">
                <textarea
                  id="address"
                  class="form-control"
                  placeholder="Address"
                ></textarea>
              </div>
              <div class="col-12 mb-3">
                <textarea
                  id="medicalCondition"
                  class="form-control"
                  placeholder="Medical Condition"
                ></textarea>
              </div>
            </div>
            <button class="btn btn-primary w-100">
              <span
                id="spinner"
                class="spinner-border spinner-border-sm me-2"
              ></span
              >Register Patient
            </button>
          </form>
          <div id="msg" class="mt-3"></div>
        </div>
      </div>
      <div class="text-center mt-3">
    <p class="mb-2">Already registered?</p>

    <a href="/login.html" class="btn btn-outline-primary w-100">
        Login
    </a>
</div>
    </div>
    
    <script>
      registerForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        spinner.style.display = "inline-block";
        const d = {
          fullName: fullName.value,
          age: Number(age.value),
          gender: gender.value,
          email: email.value,
          phone: phone.value,
          address: address.value,
          emergencyContact: emergencyContact.value,
          medicalCondition: medicalCondition.value,
        };

          spinner.style.display = "none";
          if (r.ok) {

            msg.innerHTML =
              '<div class="alert alert-danger">' +
              (j.message || "Failed") +

          }
        } catch (err) {
          spinner.style.display = "none";
          msg.innerHTML = '<div class="alert alert-danger">Server error.</div>';
        }
      });
    </script>
  </body>
</html>
