<!DOCTYPE html>
<html>
<head>
<title>Doctor Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">

<h2>Patient Monitoring Control</h2>

<button class="btn btn-danger" onclick="logout()">
Logout
</button>

</div>

<h4 class="mb-3">Registered Patients</h4>

<div id="patientList" class="row">

</div>

<hr>

<select id="patients" class="form-control mt-3">

<option>Loading patients...</option>

</select>

<button
class="btn btn-success mt-3"
onclick="startMonitoring()">

Start Monitoring

</button>

<p id="message" class="mt-3"></p>

</div>

<script>

// ============================
// LOGOUT
// ============================

function logout() {
    localStorage.clear();
    window.location.href = "/login.html";
}

// ============================
// START MONITORING
// ============================

async function startMonitoring() {

    const patientId = document.getElementById("patients").value;

    try {

        const response = await fetch("/api/device/connect", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                userId: patientId
            })
        });

        const result = await response.json();

        if(result.success){

            document.getElementById("message").innerHTML =
            "<span class='text-success'>Patient connected successfully.</span>";

        }else{

            document.getElementById("message").innerHTML =
            "<span class='text-danger'>Unable to connect patient.</span>";

        }

    } catch (err) {

        console.log(err);

        alert("Server Error");

    }

}

// ============================
// LOAD PATIENTS
// ============================

async function loadPatients() {

    try {

        const response = await fetch("/api/users");
        const users = await response.json();

        const patientList = document.getElementById("patientList");
        const select = document.getElementById("patients");

        patientList.innerHTML = "";
        select.innerHTML = "";

        users.forEach(user => {

            select.innerHTML += `
                <option value="${user._id}">
                    ${user.fullName}
                </option>
            `;

            patientList.innerHTML += `

            <div class="col-md-4 mb-3">

                <div class="card shadow">

                    <div class="card-body">

                        <h5>${user.fullName}</h5>

                        <p><strong>Email:</strong> ${user.email}</p>

                        <p><strong>Phone:</strong> ${user.phone}</p>

                        <div class="d-grid gap-2">

                            <button
                            class="btn btn-primary"
                            onclick="connectDevice('${user._id}')">

                                Connect Device

                            </button>

                            <button
                            class="btn btn-danger"
                            onclick="removePatient('${user._id}')">

                                Remove User

                            </button>

                        </div>

                    </div>

                </div>

            </div>

            `;

        });

    } catch (error) {

        console.log(error);

        alert("Unable to load patients.");

    }

}

loadPatients();

// ============================
// CONNECT DEVICE
// ============================
async function connectDevice(userId){

    try{

        Swal.fire({

            title:"Connecting Device...",

            allowOutsideClick:false,

            didOpen:()=>{

                Swal.showLoading();

            }

        });

        const response = await fetch("/api/device/connect",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                userId:userId
            })

        });

        const result = await response.json();

        if(result.success){

            Swal.fire({

                icon:"success",

                title:"Connected",

                text:"Device connected successfully"

            });

        }else{

            Swal.fire({

                icon:"error",

                title:"Failed",

                text:"Unable to connect device"

            });

        }

    }catch(error){

        console.log(error);

        Swal.fire({

            icon:"error",

            title:"Server Error",

            text:"Unable to connect to server"

        });

    }

}
}

// ============================
// REMOVE PATIENT
// ============================

async function removePatient(userId){

    const result = await Swal.fire({

    title: "Remove Patient?",

    text: "This action cannot be undone.",

    icon: "warning",

    showCancelButton: true,

    confirmButtonText: "Remove",

    cancelButtonText: "Cancel",

    confirmButtonColor: "#dc3545"

});

if(!result.isConfirmed) return;

    try{

        const response = await fetch(`/api/users/${userId}`,{
            method:"DELETE"
        });

        const result = await response.json();

        if(result.success){

            alert("Patient removed successfully.");

            loadPatients();

        }else{

            alert(result.message || "Unable to remove patient.");

        }

    }catch(error){

        console.log(error);

        alert("Server connection error.");

    }

}

</script>

</body>
</html>
